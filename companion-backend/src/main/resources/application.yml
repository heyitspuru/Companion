spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/companion_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    # Flyway owns the schema now; Hibernate must NOT auto-alter it in prod.
    # New columns/tables require a versioned migration (db/migration/V*.sql).
    hibernate:
      ddl-auto: ${DDL_AUTO:none}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    # Existing (Hibernate-built) DBs get baselined at V1 without re-running it;
    # fresh DBs build the schema from V1__baseline.sql. Future changes = V2+.
    baseline-on-migrate: true
    baseline-version: 1

  application:
    name: companion-backend

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}
  # Cap request sizes so a single oversized request can't exhaust memory. All
  # endpoints take small JSON payloads, so these limits are generous headroom.
  max-http-request-header-size: 16KB
  tomcat:
    max-http-form-post-size: 256KB
    max-swallow-size: 256KB

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}